
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WayAble - Accessibility Explorer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader" class="hidden">
        <div class="loaderContent">
            <div class="spinner"></div>
            <p>Finding accessible places...</p>
        </div>
    </div>

    <section id="landingPage">
        <nav class="navbar">
            <div class="logoContainer">
                <img src="assets/logo.jpeg" class="logo" alt="WayAble Logo">
                <h2>WayAble</h2>
            </div>
        </nav>

        <div class="hero">
            <h1>Accessibility <span>Explorer</span></h1>
            <div class="heroLine"></div>
            <p class="subtitle">Navigate the world without barriers.</p>
            <p class="description">
                Find wheelchair-friendly places, accessible facilities, and important services around you instantly.
            </p>

            <div class="searchContainer">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="locationInput" placeholder="Search city or place">
            </div>

            <div class="buttons">
                <button id="currentLocationBtn" class="primaryBtn">
                    <i class="fa-solid fa-location-dot"></i> Use Current Location
                </button>
                <button id="searchBtn" class="secondaryBtn">
                    <i class="fa-solid fa-wheelchair-move"></i> Explore Accessibility
                </button>
            </div>
        </div>
    </section>

    <section id="resultsPage" class="hidden">
        <div class="topSearch">
            <div class="searchWrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="resultSearch" placeholder="Search another city">
            </div>
            
            <div class="filterBar">
                <button class="filterBtn active" data-category="all">All</button>
                <button class="filterBtn" data-category="restaurant">🍽️ Food</button>
                <button class="filterBtn" data-category="hospital">🏥 Hospitals</button>
                <button class="filterBtn" data-category="pharmacy">💊 Pharmacies</button>
                <button class="filterBtn" data-category="hotel">🏨 Hotels</button>
                <button class="filterBtn" data-category="bank">🏦 Banks</button>
                <button class="filterBtn" data-category="toilets">🚻 Restrooms</button>
            </div>
        </div>

        <div id="map"></div>

        <div id="bottomSheet">
            <div class="sheetHandle"></div>
            <h2 class="resultTitle">Nearby Accessible Places</h2>
            <div id="placesContainer"></div>
        </div>
    </section>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="map.js"></script>
    <script src="api.js"></script>
    <script src="script.js"></script>
</body>
</html>
